services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    volumes:
      - ./observability/metrics-pipeline/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "8889:8889"
    depends_on:
      nats:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.0
    volumes:
      - ./observability/metrics-pipeline/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  anomaly-scorer:
    build:
      context: ./observability/anomaly-scorer
    environment:
      NATS_URL: nats://nats:4222
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8090:8090"
    depends_on:
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_started

  nexus-core:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.nexus-core
    environment:
      NEXUS_CONFIG: /config/local.yaml
      NATS_URL: nats://nats:4222
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    volumes:
      - ./config/example.yaml:/config/local.yaml:ro
    ports:
      - "8080:8080"
      - "50051:50051"
    depends_on:
      nats:
        condition: service_healthy

  k8s-adapter:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.k8s-adapter
    environment:
      NATS_URL: nats://nats:4222
      KUBECONFIG: /dev/null
    depends_on:
      nats:
        condition: service_healthy
