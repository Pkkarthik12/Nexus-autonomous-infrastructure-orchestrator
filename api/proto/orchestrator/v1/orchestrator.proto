syntax = "proto3";

package nexus.orchestrator.v1;

option go_package = "github.com/nexus-orchestrator/api/gen/go/orchestrator/v1;orchestratorv1";

// Nexus control plane gRPC API
service OrchestratorService {
  rpc SubmitIntent(SubmitIntentRequest) returns (SubmitIntentResponse);
  rpc GetSystemState(GetSystemStateRequest) returns (GetSystemStateResponse);
  rpc StreamEvents(StreamEventsRequest) returns (stream Event);
}

message SubmitIntentRequest {
  Intent intent = 1;
}

message SubmitIntentResponse {
  string intent_id = 1;
  string status = 2;
}

message GetSystemStateRequest {
  string target = 1;
}

message GetSystemStateResponse {
  SystemState state = 1;
}

message StreamEventsRequest {
  repeated string subjects = 1;
}

message Intent {
  string goal = 1;
  string target = 2;
  map<string, string> parameters = 3;
  Slo slo = 4;
}

message Slo {
  double availability = 1;
  int32 latency_p99_ms = 2;
}

message SystemState {
  string target = 1;
  string observed_hash = 2;
  string desired_hash = 3;
  double drift = 4;
  int64 updated_at_unix = 5;
}

message Event {
  string id = 1;
  string subject = 2;
  string payload_json = 3;
  int64 timestamp_unix = 4;
}
